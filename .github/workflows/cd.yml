name: CD - Production Deployment

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push de la imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ vars.IMAGE_NAME }}:${{ github.sha }}
            ${{ vars.IMAGE_NAME }}:latest

      - name: Escaneo de seguridad (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ vars.IMAGE_NAME }}:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Desplegar en Servidor de Pruebas (EC2 Staging)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ vars.IMAGE_NAME }}:latest"
            docker pull $IMAGE
            docker stop app-staging || true
            docker rm app-staging || true
            docker run -d --name app-staging -p 80:3000 $IMAGE

  deploy-production:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Desplegar en Servidor Principal (EC2 Production)
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            IMAGE="${{ vars.IMAGE_NAME }}:latest"
            docker pull $IMAGE
            docker stop app-prod || true
            docker rm app-prod || true
            docker run -d --name app-prod --restart unless-stopped -p 80:3000 $IMAGE
            docker system prune -f