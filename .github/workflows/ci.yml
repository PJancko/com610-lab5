name: Pipeline de Integración Continua

# 1. Eventos que disparan el workflow
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    # Sistema operativo de la máquina virtual
    runs-on: ubuntu-latest

    steps:
      # 2. Checkout del código
      - name: Checkout del código
        uses: actions/checkout@v4

      # 3. Setup del entorno (Node.js)
      - name: Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 4. Instalación de dependencias
      - name: Instalar dependencias
        run: npm ci

      # 5. Linting (Análisis estático)
      - name: Ejecutar Linting
        # Usamos "continue-on-error" por si no configuraste ESLint a fondo todavía, 
        # para que no detenga el pipeline, pero lo ideal es que pase.
        run: npm run lint || echo "No se encontró configuración de ESLint, saltando..."

      # 6. Ejecución de pruebas unitarias y reporte de cobertura
      - name: Ejecutar pruebas y generar cobertura
        run: npm test

      # 7. Subir reporte de cobertura como artefacto (Opcional, muy útil para el informe)
      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: reporte-cobertura
          path: coverage/